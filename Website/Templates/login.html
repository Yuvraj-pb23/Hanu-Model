{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Login | HanuAI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ======= Global ======= */
    * { box-sizing: border-box; margin:0; padding:0; font-family: 'Arial', sans-serif; }
    body, html { height: 100%; background: #1e293b; display: flex; justify-content: center; align-items: center; }

    /* ======= Container ======= */
    .login-container {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      width: 360px;
      text-align: center;
      position: relative;
    }

    /* ======= Logo ======= */
    .login-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: url("{% static 'Media/Base/mainlogo.png' %}") no-repeat center/cover;
    }

    h2 { font-size: 1.8rem; margin-bottom: 20px; color: #0b76ff; }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #cbd5e1;
      font-size: 1rem;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 6px;
      background: #0b76ff;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    button:hover { background: #0955cc; }

    .msg { color: red; margin-top: 10px; font-size: 0.9rem; }

    /* ======= Return Home Button ======= */
    .home-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 8px 16px;
      border-radius: 6px;
      background: #f3f4f6;
      color: #1e293b;
      font-size: 0.9rem;
      text-decoration: none;
      transition: all 0.3s ease;
      border: 1px solid #cbd5e1;
    }
    .home-btn:hover { background: #e2e8f0; }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="login-logo"></div>
    <h2>Login</h2>

    <form method="post">
      {% csrf_token %}
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>

    {% if messages %}
      <div class="msg">
        {% for m in messages %}{{ m }}<br>{% endfor %}
      </div>
    {% endif %}

    <a href="{% url 'home' %}" class="home-btn"><i class="fas fa-home"></i> Return to Home</a>
  </div>
</body>
</html>
