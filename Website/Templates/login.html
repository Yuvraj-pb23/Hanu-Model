{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | HanuAI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ======= Global ======= */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
    }

    body,
    html {
      height: 100%;
      background: #1e293b;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ======= Container ======= */
    .login-container {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      width: 90%;
      max-width: 360px;
      text-align: center;
      position: relative;
    }

    /* ======= Logo ======= */
    .login-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0b76ff, #06b6d4);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-size: 2.2rem;
      box-shadow: 0 8px 20px rgba(11, 118, 255, 0.35);
    }

    h2 {
      font-size: 1.8rem;
      margin-bottom: 20px;
      color: #0b76ff;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #cbd5e1;
      font-size: 1rem;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 6px;
      background: #0b76ff;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background: #0955cc;
    }

    .msg {
      color: red;
      margin-top: 10px;
      font-size: 0.9rem;
    }

    /* ======= Floating Back Button ======= */
    .floating-back-btn {
      position: absolute;
      top: 25px;
      left: 25px;
      color: #fff;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 50px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
      overflow: hidden;
      animation: fadeInSlide 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @media (max-width: 768px) {
      .login-logo {
        width: 50px;
        height: 50px;
      }
    }

    @keyframes fadeInSlide {
      0% {
        opacity: 0;
        transform: translate(-15px, -15px);
      }

      100% {
        opacity: 1;
        transform: translate(0, 0);
      }
    }

    .floating-back-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.6s ease;
      z-index: -1;
    }

    .floating-back-btn:hover::before {
      left: 100%;
    }

    .floating-back-btn:hover {
      background: rgba(11, 118, 255, 0.85);
      /* match brand blue */
      border-color: rgba(11, 118, 255, 1);
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 8px 25px rgba(11, 118, 255, 0.5);
    }

    .floating-back-btn i {
      transition: transform 0.4s ease;
    }

    .floating-back-btn:hover i {
      transform: translateX(-4px);
    }
  </style>
</head>

<body>
  <a href="{% url 'home' %}" class="floating-back-btn">
    <i class="fas fa-arrow-left"></i> Back to Home
  </a>
  <div class="login-container">
    <div class="login-logo">
      <i class="fas fa-brain"></i>
    </div>
    <h2>Login</h2>

    <form method="post">
      {% csrf_token %}
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>

    {% if messages %}
    <div class="msg">
      {% for m in messages %}{{ m }}<br>{% endfor %}
    </div>
    {% endif %}
  </div>
</body>

</html>
